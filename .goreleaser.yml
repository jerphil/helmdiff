version: 2

project_name: helmdiff

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
  groups:
    - title: "Breaking Changes"
      regexp: "^.*!:.*$"
      order: 0
    - title: "New Features"
      regexp: "^.*feat.*:.*$"
      order: 1
    - title: "Bug Fixes"
      regexp: "^.*fix.*:.*$"
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: jerphil
    name: helmdiff
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
